name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec slidev build --base /${{ github.event.repository.name }}/

      # Slidev injects `<link rel="preload" as="image" href="./images/...">` into the
      # built HTML, but those original paths don't exist under dist/ (Vite hashes the
      # real assets into dist/assets/). The preload links 404 in the browser console
      # without affecting rendering. Strip them.
      - name: Strip broken image preload links
        run: |
          grep -rl 'rel="preload" as="image"' dist --include='*.html' \
            | xargs -r sed -i -E '/<link[^>]*rel="preload"[^>]*as="image"[^>]*>/d'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
